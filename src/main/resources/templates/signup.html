<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up - NoteOrg</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg2)">
    <div class="card" style="width:100%;max-width:400px;padding:32px">
        <h1 style="font-size:24px;margin-bottom:8px">Create Account</h1>
        <p style="color:var(--txt2);margin-bottom:24px">Join NoteOrg to start organizing your class notes.</p>

        <form th:action="@{/signup}" method="post" th:object="${user}">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" th:field="*{name}" class="form-control" required placeholder="Your Name">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" th:field="*{password}" class="form-control" required placeholder="At least 8 characters">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px">Sign Up</button>
        </form>
        <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--txt2)">
            Already have an account? <a th:href="@{/login}" style="color:var(--p600)">Login</a>
        </p>
    </div>
</body>
</html>
