<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - NoteOrg</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg2)">
    <div class="card" style="width:100%;max-width:400px;padding:32px">
        <h1 style="font-size:24px;margin-bottom:8px">Login</h1>
        <p style="color:var(--txt2);margin-bottom:24px">Welcome back! Please enter your details.</p>

        <form th:action="@{/login}" method="post">
            <div th:if="${param.error}" class="alert alert-error" style="margin-bottom:16px">
                Invalid email or password.
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:16px">Login</button>
        </form>
        <p style="text-align:center;margin-top:20px;font-size:14px;color:var(--txt2)">
            Don't have an account? <a th:href="@{/signup}" style="color:var(--p600)">Sign up</a>
        </p>
    </div>
</body>
</html>
